<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EsarIA — CRM Leads</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-name">EsarIA</span>
        <span class="brand-badge">CRM Leads</span>
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-alta">0</span>
          <span class="stat-label">Alta prioridad</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-reunion">0</span>
          <span class="stat-label">Reunion agendada</span>
        </div>
      </div>
    </div>
  </header>

  <section class="filters" id="filters">
    <div class="filters-inner">
      <input
        type="search"
        id="search-input"
        placeholder="Buscar empresa, sector, ciudad, decisor..."
        class="filter-search"
      >
      <select id="filter-sector" class="filter-select">
        <option value="">Todos los sectores</option>
      </select>
      <select id="filter-prioridad" class="filter-select">
        <option value="">Prioridad</option>
        <option value="Alta">Alta</option>
        <option value="Media">Media</option>
        <option value="Baja">Baja</option>
      </select>
      <select id="filter-estado" class="filter-select">
        <option value="">Estado</option>
        <option value="Nuevo">Nuevo</option>
        <option value="Investigado">Investigado</option>
        <option value="Llamado">Llamado</option>
        <option value="Reunion agendada">Reunion agendada</option>
        <option value="Descartado">Descartado</option>
      </select>
      <div class="filter-actions">
        <button class="btn btn-secondary" id="btn-import">Importar JSON</button>
        <button class="btn btn-secondary" id="btn-export">Exportar JSON</button>
        <input type="file" id="file-import" accept=".json" style="display:none">
      </div>
    </div>
  </section>

  <main id="leads-grid" class="leads-grid"></main>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="Cerrar">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
