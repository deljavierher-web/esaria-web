<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>EsarIA · Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg:#0F172A; --bg2:#1e293b; --panel:#152033; --line:#283449;
    --text:#F8FAFC; --muted:#94a3b8; --accent:#6D5EF3; --green:#22c55e;
    --red:#ef4444; --amber:#f59e0b;
  }
  * { box-sizing:border-box }
  html,body { margin:0; height:100%; overflow:hidden }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  .app { display:grid; grid-template-columns: 340px 1fr; height:100vh; height:100dvh }
  aside { background:var(--bg2); border-right:1px solid var(--line); display:flex; flex-direction:column; min-width:0; min-height:0; overflow:hidden }
  header.top { padding:14px 16px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center }
  header.top h1 { margin:0; font-size:15px; font-weight:600; letter-spacing:.3px }
  header.top .stat { color:var(--muted); font-size:12px }
  .controls { padding:10px 12px; display:flex; gap:8px; flex-wrap:wrap; border-bottom:1px solid var(--line) }
  .controls input, .controls select {
    padding:8px 10px; background:var(--panel); border:1px solid var(--line);
    color:var(--text); border-radius:6px; font-size:13px; flex:1; min-width:0;
  }
  .controls select { flex:0 0 110px }
  .leads { overflow-y:auto; flex:1 }
  .lead { padding:12px 16px; border-bottom:1px solid var(--line); cursor:pointer; }
  .lead:hover { background:var(--panel) }
  .lead.active { background:var(--panel); border-left:3px solid var(--accent); padding-left:13px }
  .lead .row1 { display:flex; justify-content:space-between; gap:8px; align-items:center }
  .lead .name { font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
  .lead .when { color:var(--muted); font-size:11px; flex-shrink:0 }
  .lead .preview { color:var(--muted); font-size:12px; margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
  .badge { display:inline-block; padding:2px 7px; border-radius:99px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; margin-right:6px }
  .badge.first_contact { background:#334155; color:#cbd5e1 }
  .badge.collecting_info { background:#1e3a5f; color:#93c5fd }
  .badge.qualified { background:#14532d; color:#86efac }
  .badge.requires_human { background:#7c2d12; color:#fdba74 }
  main { display:flex; flex-direction:column; min-width:0; min-height:0; height:100%; overflow:hidden }
  .conv-header { flex:0 0 auto; padding:14px 20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:flex-start; gap:16px; background:var(--bg); z-index:2 }
  .conv-header h2 { margin:0 0 4px 0; font-size:16px }
  .conv-header .meta { color:var(--muted); font-size:12px; line-height:1.6 }
  .conv-header button { background:var(--bg2); color:var(--text); border:1px solid var(--line); padding:8px 12px; border-radius:6px; cursor:pointer; font-size:12px }
  .conv-header button:hover { background:var(--panel) }
  .messages { flex:1 1 auto; min-height:0; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:8px; background:linear-gradient(180deg, var(--bg) 0%, #0b1322 100%) }
  .msg { max-width:70%; padding:10px 14px; border-radius:12px; word-wrap:break-word; line-height:1.4 }
  .msg.in { align-self:flex-start; background:var(--bg2); border-bottom-left-radius:4px }
  .msg.out { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px }
  .msg .ts { font-size:10px; opacity:.65; margin-top:4px; display:block }
  .composer { flex:0 0 auto; border-top:1px solid var(--line); padding:14px 20px; display:flex; gap:10px; background:var(--bg) }
  .composer textarea {
    flex:1; padding:10px 12px; background:var(--bg2); color:var(--text);
    border:1px solid var(--line); border-radius:8px; resize:none; font-family:inherit; font-size:14px; min-height:42px; max-height:120px;
  }
  .composer button {
    background:var(--accent); color:#fff; border:0; padding:0 18px;
    border-radius:8px; cursor:pointer; font-weight:600; font-size:14px;
  }
  .composer button:disabled { opacity:.5; cursor:not-allowed }
  .empty { color:var(--muted); padding:60px 20px; text-align:center }
  .toast { position:fixed; bottom:20px; right:20px; background:var(--bg2); padding:12px 16px; border-radius:8px; border:1px solid var(--line); max-width:300px }
  .toast.error { border-color:var(--red); color:#fecaca }
  .toast.ok { border-color:var(--green); color:#bbf7d0 }
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr }
    aside { display:var(--m-aside, flex) }
    main  { display:var(--m-main, none) }
    body.mobile-conv { --m-aside:none; --m-main:flex }
  }
</style>
</head>
<body>
<div class="app">
  <aside>
    <header class="top">
      <h1>EsarIA · Admin</h1>
      <span class="stat" id="stat">—</span>
    </header>
    <div class="controls">
      <input id="q" placeholder="Buscar...">
      <select id="state">
        <option value="">Todos</option>
        <option value="first_contact">First</option>
        <option value="collecting_info">Collecting</option>
        <option value="qualified">Qualified</option>
        <option value="requires_human">Human</option>
      </select>
    </div>
    <div class="leads" id="leads"></div>
  </aside>
  <main id="main">
    <div class="empty">Selecciona un lead</div>
  </main>
</div>
<div id="toast"></div>

<script>
const state = { selected: null, leads: [] };
const $ = (id) => document.getElementById(id);

function fmt(iso) {
  if (!iso) return "";
  const d = new Date(typeof iso === "number" ? iso*1000 : iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  return sameDay ? d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}) : d.toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"});
}

function toast(msg, type="ok") {
  const t = $("toast");
  t.innerHTML = `<div class="toast ${type}">${escapeHtml(msg)}</div>`;
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(() => t.innerHTML = "", 3000);
}

function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function api(path, opts = {}) {
  const r = await fetch("/admin/api" + path, { headers:{"Content-Type":"application/json"}, ...opts });
  if (r.status === 401) { document.cookie="admin_token=;path=/;max-age=0"; location.reload(); throw new Error("unauthorized"); }
  if (!r.ok) {
    let err = "error";
    try { err = (await r.json()).error || err } catch {}
    throw new Error(err);
  }
  return r.json();
}

async function loadLeads() {
  try {
    const q = $("q").value.trim();
    const st = $("state").value;
    const data = await api(`/leads?limit=200${q?`&q=${encodeURIComponent(q)}`:""}${st?`&state=${st}`:""}`);
    state.leads = data.leads;
    $("stat").textContent = `${data.total}/${data.grandTotal}`;
    renderLeads();
  } catch (e) { toast("Error cargando leads: "+e.message,"error") }
}

function renderLeads() {
  if (!state.leads.length) {
    $("leads").innerHTML = `<div class="empty" style="padding:30px 20px;font-size:13px">Sin leads</div>`;
    return;
  }
  $("leads").innerHTML = state.leads.map(l => `
    <div class="lead ${state.selected===l.from?"active":""}" data-from="${escapeHtml(l.from)}">
      <div class="row1">
        <div class="name">${escapeHtml(l.name || l.profileName || l.from)}</div>
        <div class="when">${fmt(l.updatedAt)}</div>
      </div>
      <div class="preview">
        <span class="badge ${l.state||"first_contact"}">${l.state||"—"}</span>
        ${escapeHtml(l.lastMessage || l.problema || l.sector || "")}
      </div>
    </div>
  `).join("");
  $("leads").querySelectorAll(".lead").forEach(el =>
    el.addEventListener("click", () => selectLead(el.dataset.from))
  );
}

async function selectLead(from) {
  state.selected = from;
  document.body.classList.add("mobile-conv");
  renderLeads();
  $("main").innerHTML = `<div class="empty">Cargando...</div>`;
  try {
    const data = await api("/conversation/" + encodeURIComponent(from));
    renderConversation(data);
  } catch (e) { $("main").innerHTML = `<div class="empty">Error: ${e.message}</div>` }
}

function renderConversation({ lead, messages, statuses }) {
  const l = lead || { from: state.selected };
  const sortedMsgs = [...(messages||[])].sort((a,b) => Number(a.timestamp||0) - Number(b.timestamp||0));

  const metaParts = [];
  if (l.sector) metaParts.push(`Sector: <b>${escapeHtml(l.sector)}</b>`);
  if (l.problema) metaParts.push(`Problema: ${escapeHtml(l.problema)}`);
  if (l.volumen) metaParts.push(`Volumen: ${escapeHtml(l.volumen)}`);
  if (l.urgencia) metaParts.push(`Urgencia: ${escapeHtml(l.urgencia)}`);

  $("main").innerHTML = `
    <div class="conv-header">
      <div>
        <button onclick="document.body.classList.remove('mobile-conv')" style="display:none" class="m-back">←</button>
        <h2>${escapeHtml(l.name || l.profileName || l.from)} <span class="badge ${l.state||"first_contact"}">${l.state||"—"}</span></h2>
        <div class="meta">${escapeHtml(l.from)}<br>${metaParts.join(" · ")}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="markHuman('${escapeHtml(l.from)}')">Marcar humano</button>
        <button onclick="selectLead('${escapeHtml(l.from)}')">↻</button>
      </div>
    </div>
    <div class="messages" id="msgs">
      ${sortedMsgs.length === 0 ? `<div class="empty">Sin mensajes</div>` : sortedMsgs.map(m => renderMsg(m)).join("")}
    </div>
    <div class="composer">
      <textarea id="composer" placeholder="Escribe una respuesta... (Enter para enviar, Shift+Enter salto de línea)" rows="2"></textarea>
      <button id="send" onclick="sendReply('${escapeHtml(l.from)}')">Enviar</button>
    </div>
  `;
  const msgs = $("msgs"); if (msgs) msgs.scrollTop = msgs.scrollHeight;
  const ta = $("composer");
  if (ta) {
    ta.focus();
    ta.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendReply(l.from); }
    });
  }
}

function renderMsg(m) {
  const isOut = m.direction === "outbound";
  const status = isOut && m.deliveryStatus ? ` · ${m.deliveryStatus}` : "";
  return `<div class="msg ${isOut?"out":"in"}">
    ${escapeHtml(m.text || `[${m.type||"sin texto"}]`)}
    <span class="ts">${fmt(m.timestamp)}${status}</span>
  </div>`;
}

async function sendReply(to) {
  const ta = $("composer"); const text = ta.value.trim();
  if (!text) return;
  $("send").disabled = true;
  try {
    await api("/reply", { method:"POST", body: JSON.stringify({ to, text }) });
    ta.value = "";
    toast("Enviado");
    await selectLead(to);
    await loadLeads();
  } catch (e) {
    toast("Error: "+e.message,"error");
  } finally {
    $("send").disabled = false;
  }
}

async function markHuman(phone) {
  if (!confirm("¿Marcar este lead como requires_human?")) return;
  try {
    await api("/mark-human", { method:"POST", body: JSON.stringify({ phone }) });
    toast("Marcado para revisión humana");
    await selectLead(phone);
    await loadLeads();
  } catch (e) { toast("Error: "+e.message,"error") }
}

$("q").addEventListener("input", debounce(loadLeads, 300));
$("state").addEventListener("change", loadLeads);

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

loadLeads();
setInterval(loadLeads, 8000);
</script>
</body>
</html>
