<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#0F172A"/>
  <rect x="0" y="0" width="8" height="1350" fill="#6D5EF3"/>

  <!-- Number -->
  <text x="80" y="160" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="100" font-weight="800" fill="#6D5EF3">2.</text>

  <!-- Headline -->
  <text x="80" y="260" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="56" font-weight="800" fill="#FFFFFF">Responder siempre</text>
  <text x="80" y="326" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="56" fill="#FFFFFF">las mismas preguntas</text>

  <!-- Divider -->
  <rect x="80" y="380" width="920" height="1" fill="#FFFFFF" opacity="0.12"/>

  <!-- Quote-style items -->
  <rect x="80" y="410" width="700" height="56" rx="8" fill="#FFFFFF" fill-opacity="0.05"/>
  <text x="110" y="450" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#64748B">¿Cuál es vuestro horario?</text>

  <rect x="80" y="480" width="700" height="56" rx="8" fill="#FFFFFF" fill-opacity="0.05"/>
  <text x="110" y="520" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#64748B">¿Cuánto cuesta una revisión?</text>

  <rect x="80" y="550" width="700" height="56" rx="8" fill="#FFFFFF" fill-opacity="0.05"/>
  <text x="110" y="590" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#64748B">¿Tenéis hueco esta semana?</text>

  <!-- Divider -->
  <rect x="80" y="650" width="920" height="1" fill="#FFFFFF" opacity="0.12"/>

  <!-- Body -->
  <text x="80" y="730" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" fill="#FFFFFF">Un asistente automático puede</text>
  <text x="80" y="788" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" font-weight="700" fill="#6D5EF3">responder esto 24/7.</text>

  <!-- Bottom separator -->
  <rect x="60" y="1210" width="960" height="1" fill="#FFFFFF" opacity="0.12"/>

  <!-- Logo dark version -->
  <g transform="translate(447, 1258) scale(1.5)">
    <g transform="translate(2, 2)">
      <rect x="0" y="5" width="36" height="5" rx="2.5" fill="#FFFFFF"/>
      <rect x="0" y="15.5" width="22" height="5" rx="2.5" fill="#FFFFFF"/>
      <circle cx="31" cy="18" r="5" fill="#6D5EF3"/>
      <rect x="0" y="26" width="36" height="5" rx="2.5" fill="#FFFFFF"/>
    </g>
    <text x="50" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.6">
      <tspan fill="#FFFFFF">Esar</tspan><tspan fill="#6D5EF3">IA</tspan>
    </text>
  </g>
</svg>
