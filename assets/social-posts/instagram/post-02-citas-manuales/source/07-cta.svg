<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#0F172A"/>
  <rect x="0" y="0" width="8" height="1350" fill="#6D5EF3"/>

  <!-- Big CTA layout -->
  <text x="540" y="330" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="80" font-weight="800" fill="#FFFFFF">¿Te suena</text>
  <text x="540" y="422" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="80" fill="#FFFFFF">este problema?</text>

  <!-- Divider -->
  <rect x="60" y="490" width="960" height="1" fill="#FFFFFF" opacity="0.12"/>

  <!-- CTA text -->
  <text x="540" y="590" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="52" font-weight="700" fill="#6D5EF3">Escríbenos por DM</text>
  <text x="540" y="654" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" fill="#FFFFFF">y vemos si tiene sentido</text>
  <text x="540" y="708" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" fill="#FFFFFF">automatizarlo en tu caso.</text>

  <!-- Divider -->
