<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1080" height="8" fill="#6D5EF3"/>

  <!-- Headline -->
  <text x="540" y="190" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" font-weight="800" fill="#0F172A">¿Esto puede servir</text>
  <text x="540" y="274" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" fill="#0F172A">para tu negocio?</text>

  <!-- Divider -->
  <rect x="80" y="340" width="920" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Sector list -->
  <text x="540" y="430" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="52" font-weight="700" fill="#0F172A">Clínicas</text>
  <text x="540" y="500" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="52" fill="#0F172A">Consultas · Talleres</text>
  <text x="540" y="570" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="52" fill="#0F172A">Centros de estética</text>
  <text x="540" y="640" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="52" fill="#0F172A">Academias · Gimnasios</text>
  <text x="540" y="710" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="52" fill="#0F172A">Comercios</text>

  <!-- Thin purple divider -->
  <rect x="80" y="780" width="920" height="2" fill="#6D5EF3" opacity="0.4"/>

  <!-- Emphasis -->
  <text x="540" y="850" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" font-weight="700" fill="#6D5EF3">Cualquier negocio con agenda fija</text>

  <!-- Note -->
  <text x="540" y="940" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="30" fill="#64748B">(Si tienes agenda, probablemente algo aplica)</text>

  <!-- Bottom separator -->
  <rect x="60" y="1210" width="960" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Logo light version -->
  <g transform="translate(447, 1258) scale(1.5)">
    <g transform="translate(2, 2)">
      <rect x="0" y="5" width="36" height="5" rx="2.5" fill="#0F172A"/>
      <rect x="0" y="15.5" width="22" height="5" rx="2.5" fill="#0F172A"/>
      <circle cx="31" cy="18" r="5" fill="#6D5EF3"/>
      <rect x="0" y="26" width="36" height="5" rx="2.5" fill="#0F172A"/>
    </g>
    <text x="50" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.6">
      <tspan fill="#0F172A">Esar</tspan><tspan fill="#6D5EF3">IA</tspan>
    </text>
  </g>
</svg>
