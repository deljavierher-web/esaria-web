<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1080" height="8" fill="#6D5EF3"/>

  <!-- Headline -->
  <text x="80" y="100" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="60" font-weight="800" fill="#0F172A">El ciclo que se repite</text>
  <text x="80" y="172" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="60" font-weight="800" fill="#0F172A">cada día</text>

  <!-- Divider -->
  <rect x="80" y="210" width="920" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Arrow list items -->
  <text x="80" y="360" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#334155"><tspan fill="#6D5EF3">→</tspan> El cliente escribe por WhatsApp</text>
  <text x="80" y="430" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#334155"><tspan fill="#6D5EF3">→</tspan> Lo apuntas en la agenda</text>
  <text x="80" y="500" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#334155"><tspan fill="#6D5EF3">→</tspan> Mandas el recordatorio tú mismo</text>
  <text x="80" y="570" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#334155"><tspan fill="#6D5EF3">→</tspan> El cliente cancela</text>
  <text x="80" y="640" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#334155"><tspan fill="#6D5EF3">→</tspan> Buscas hueco libre</text>
  <text x="80" y="710" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" font-weight="700" fill="#6D5EF3"><tspan fill="#6D5EF3">→</tspan> Vuelta a empezar</text>

  <!-- Divider -->
  <rect x="80" y="790" width="920" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Te suena? -->
  <text x="540" y="870" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" fill="#6D5EF3">¿Te suena?</text>

  <!-- Bottom separator -->
  <rect x="60" y="1210" width="960" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Logo light version -->
  <g transform="translate(447, 1258) scale(1.5)">
    <g transform="translate(2, 2)">
      <rect x="0" y="5" width="36" height="5" rx="2.5" fill="#0F172A"/>
      <rect x="0" y="15.5" width="22" height="5" rx="2.5" fill="#0F172A"/>
      <circle cx="31" cy="18" r="5" fill="#6D5EF3"/>
      <rect x="0" y="26" width="36" height="5" rx="2.5" fill="#0F172A"/>
    </g>
    <text x="50" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.6">
      <tspan fill="#0F172A">Esar</tspan><tspan fill="#6D5EF3">IA</tspan>
    </text>
  </g>
</svg>
