<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1080" height="8" fill="#6D5EF3"/>

  <!-- Headline -->
  <text x="540" y="260" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" font-weight="800" fill="#0F172A">¿Y si ya tengo un</text>
  <text x="540" y="344" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" fill="#0F172A">software de gestión?</text>

  <!-- Divider -->
  <rect x="80" y="410" width="920" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Big answer -->
  <text x="540" y="520" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="100" font-weight="800" fill="#6D5EF3">Mejor.</text>

  <!-- Divider -->
  <rect x="80" y="600" width="920" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Explanation -->
  <text x="540" y="680" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#334155">En muchos casos, la automatización</text>
  <text x="540" y="732" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#334155">funciona sobre lo que ya tienes.</text>
  <text x="540" y="820" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#64748B">No siempre hay que cambiar</text>
  <text x="540" y="872" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#64748B">de herramienta ni empezar desde cero.</text>

  <!-- Bottom separator -->
  <rect x="60" y="1210" width="960" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Logo light version -->
  <g transform="translate(447, 1258) scale(1.5)">
    <g transform="translate(2, 2)">
      <rect x="0" y="5" width="36" height="5" rx="2.5" fill="#0F172A"/>
      <rect x="0" y="15.5" width="22" height="5" rx="2.5" fill="#0F172A"/>
      <circle cx="31" cy="18" r="5" fill="#6D5EF3"/>
      <rect x="0" y="26" width="36" height="5" rx="2.5" fill="#0F172A"/>
    </g>
    <text x="50" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.6">
      <tspan fill="#0F172A">Esar</tspan><tspan fill="#6D5EF3">IA</tspan>
    </text>
  </g>
</svg>
