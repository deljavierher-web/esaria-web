<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#0F172A"/>
  <rect x="0" y="0" width="8" height="1350" fill="#6D5EF3"/>

  <!-- Headline -->
  <text x="540" y="320" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF">Lo que nos importa</text>

  <!-- Divider -->
  <rect x="60" y="390" width="960" height="1" fill="#FFFFFF" opacity="0.12"/>

  <!-- Big statement -->
  <text x="540" y="490" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="60" fill="#FFFFFF">Que tenga sentido</text>
  <text x="540" y="562" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="60" fill="#FFFFFF">para tu negocio específico.</text>

  <!-- Divider -->
  <rect x="60" y="630" width="960" height="1" fill="#FFFFFF" opacity="0.12"/>

  <!-- Honest note -->
  <text x="540" y="720" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="52" font-weight="700" fill="#6D5EF3">Si no lo tiene,</text>
  <text x="540" y="784" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="52" font-weight="700" fill="#6D5EF3">te lo decimos.</text>

  <!-- Bottom separator -->
  <rect x="60" y="1210" width="960" height="1" fill="#FFFFFF" opacity="0.12"/>

  <!-- Logo dark version -->
  <g transform="translate(447, 1258) scale(1.5)">
    <g transform="translate(2, 2)">
      <rect x="0" y="5" width="36" height="5" rx="2.5" fill="#FFFFFF"/>
      <rect x="0" y="15.5" width="22" height="5" rx="2.5" fill="#FFFFFF"/>
      <circle cx="31" cy="18" r="5" fill="#6D5EF3"/>
      <rect x="0" y="26" width="36" height="5" rx="2.5" fill="#FFFFFF"/>
    </g>
    <text x="50" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.6">
      <tspan fill="#FFFFFF">Esar</tspan><tspan fill="#6D5EF3">IA</tspan>
    </text>
  </g>
</svg>
