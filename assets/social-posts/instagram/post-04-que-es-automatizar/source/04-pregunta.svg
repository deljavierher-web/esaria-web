<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#0F172A"/>
  <rect x="0" y="0" width="8" height="1350" fill="#6D5EF3"/>

  <!-- Main text -->
  <text x="540" y="300" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="60" font-weight="800" fill="#FFFFFF">La automatización útil</text>
  <text x="540" y="372" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="60" fill="#FFFFFF">empieza con una pregunta:</text>

  <!-- Big question -->
  <text x="540" y="500" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="64" font-weight="800" fill="#6D5EF3">¿Qué tarea haces hoy</text>
  <text x="540" y="576" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="64" fill="#6D5EF3">una y otra vez que podrías</text>
  <text x="540" y="652" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="64" fill="#6D5EF3">dejar de repetir mañana?</text>

  <!-- Bottom separator -->
  <rect x="60" y="1210" width="960" height="1" fill="#FFFFFF" opacity="0.12"/>

  <!-- Logo dark version -->
  <g transform="translate(447, 1258) scale(1.5)">
    <g transform="translate(2, 2)">
      <rect x="0" y="5" width="36" height="5" rx="2.5" fill="#FFFFFF"/>
      <rect x="0" y="15.5" width="22" height="5" rx="2.5" fill="#FFFFFF"/>
      <circle cx="31" cy="18" r="5" fill="#6D5EF3"/>
      <rect x="0" y="26" width="36" height="5" rx="2.5" fill="#FFFFFF"/>
    </g>
    <text x="50" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.6">
      <tspan fill="#FFFFFF">Esar</tspan><tspan fill="#6D5EF3">IA</tspan>
    </text>
  </g>
</svg>
