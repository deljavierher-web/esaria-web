<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1080" height="8" fill="#6D5EF3"/>

  <!-- Time label -->
  <text x="80" y="120" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" font-weight="600" fill="#6D5EF3">Al cerrar…</text>

  <!-- Divider -->
  <rect x="80" y="160" width="920" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Scenario -->
  <text x="80" y="280" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" fill="#334155">Si un paciente lleva tiempo</text>
  <text x="80" y="334" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" fill="#334155">sin volver, puede quedar marcado</text>
  <text x="80" y="388" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" fill="#334155">para seguimiento.</text>

  <!-- Divider -->
  <rect x="80" y="460" width="920" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Note -->
  <text x="80" y="550" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" font-weight="700" fill="#6D5EF3">Nadie tiene que acordarse</text>
  <text x="80" y="604" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" font-weight="700" fill="#6D5EF3">manualmente de cada caso.</text>

  <!-- Muted line -->
  <text x="80" y="720" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="34" fill="#64748B">(Y si hay que hacer algo, llega un aviso.)</text>

  <!-- Bottom separator -->
  <rect x="60" y="1210" width="960" height="1" fill="#0F172A" opacity="0.1"/>

  <!-- Logo light version -->
  <g transform="translate(447, 1258) scale(1.5)">
    <g transform="translate(2, 2)">
      <rect x="0" y="5" width="36" height="5" rx="2.5" fill="#0F172A"/>
      <rect x="0" y="15.5" width="22" height="5" rx="2.5" fill="#0F172A"/>
      <circle cx="31" cy="18" r="5" fill="#6D5EF3"/>
      <rect x="0" y="26" width="36" height="5" rx="2.5" fill="#0F172A"/>
    </g>
    <text x="50" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.6">
      <tspan fill="#0F172A">Esar</tspan><tspan fill="#6D5EF3">IA</tspan>
    </text>
  </g>
</svg>
