<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#0F172A"/>
  <rect x="0" y="0" width="8" height="1350" fill="#6D5EF3"/>

  <!-- CTA -->
  <text x="540" y="310" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF">¿Tienes una clínica</text>
  <text x="540" y="394" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" fill="#FFFFFF">o consulta en Valladolid?</text>

  <!-- Divider -->
  <rect x="60" y="460" width="960" height="1" fill="#FFFFFF" opacity="0.12"/>

  <!-- Body -->
  <text x="540" y="560" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="48" font-weight="700" fill="#6D5EF3">Escríbenos por DM y vemos</text>
  <text x="540" y="620" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" fill="#FFFFFF">si algo así tendría sentido</text>
  <text x="540" y="676" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="44" fill="#FFFFFF">en tu caso.</text>

  <!-- Divider -->
