  <!-- Terms -->
  <text x="540" y="820" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" fill="#94A3B8">Sin coste inicial. Sin compromiso.</text>

  <!-- Tagline -->
  <text x="540" y="910" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="32" fill="#64748B">EsarIA — Automatización útil para negocios reales</text>

  <!-- Bottom separator -->
