  <text x="540" y="364" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" fill="#FFFFFF">de una clínica con</text>
  <text x="540" y="448" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" fill="#6D5EF3">automatización?</text>

  <!-- Divider -->
