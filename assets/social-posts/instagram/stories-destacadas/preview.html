<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories Destacadas (3)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0F172A; color: #F8FAFC; padding: 40px 32px; min-height: 100vh; }
    h1 { font-size: 22px; font-weight: 800; color: #FFFFFF; margin-bottom: 6px; }
    .meta { font-size: 13px; color: #64748B; margin-bottom: 32px; }
    .slides-strip { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; margin-bottom: 32px; }
    .slide-wrap { flex-shrink: 0; text-align: center; }
    .slide-wrap img { display: block; border-radius: 8px; border: 1px solid #1E293B; }
    .slide-label { font-size: 12px; color: #94A3B8; margin-top: 8px; font-weight: 500; }
    .caption-box { background: #1E293B; border: 1px solid #334155; border-radius: 12px; padding: 24px; max-width: 600px; }
    .caption-box h2 { font-size: 13px; font-weight: 600; color: #6D5EF3; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
    .caption-box p { font-size: 14px; color: #94A3B8; line-height: 1.7; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Stories Destacadas (3)</h1>
  <p class="meta">Formato: Stories · 1080×1920px · Guardar como destacadas el día 1</p>
  <div class="slides-strip">
    <div class="slide-wrap">
      <img src="source/story-01-que-hacemos.svg" width="200" alt="Story 01 — Qué hacemos">
      <div class="slide-label">¿Qué hacemos?</div>
    </div>
    <div class="slide-wrap">
      <img src="source/story-02-sectores.svg" width="200" alt="Story 02 — Sectores">
      <div class="slide-label">Sectores</div>
    </div>
    <div class="slide-wrap">
      <img src="source/story-03-contacto.svg" width="200" alt="Story 03 — Contacto">
      <div class="slide-label">Contacto</div>
    </div>
  </div>
  <div class="caption-box">
    <h2>Nota</h2>
    <p>Las stories no tienen caption. Publicarlas como contenido de stories y guardarlas en Destacadas el mismo día de lanzamiento (Día 1).</p>
  </div>
</body>
</html>
