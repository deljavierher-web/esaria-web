<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0F172A;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .card {
    width: 1200px;
    height: 630px;
    padding: 72px 88px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  /* Subtle accent line left edge */
  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 80px;
    bottom: 80px;
    width: 4px;
    background: #6D5EF3;
    border-radius: 0 2px 2px 0;
  }
  /* Subtle background glow */
  .card::after {
    content: '';
    position: absolute;
    right: -100px;
    top: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(109,94,243,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .top { display: flex; flex-direction: column; gap: 32px; }
  .logo svg { display: block; }
  .content { display: flex; flex-direction: column; gap: 16px; }
  .headline {
    font-size: 52px;
    font-weight: 800;
    color: #F8FAFC;
    line-height: 1.15;
    letter-spacing: -1.5px;
    max-width: 820px;
  }
  .sub {
    font-size: 26px;
    font-weight: 400;
    color: #64748B;
    line-height: 1.4;
    letter-spacing: -0.3px;
  }
  .bottom {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6D5EF3;
  }
  .url {
    font-size: 20px;
    color: #475569;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="logo">
      <!-- EsarIA logo dark version — inline SVG -->
      <svg viewBox="0 0 200 44" width="180" height="40" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(2, 2)">
          <rect x="0" y="5"    width="36" height="5" rx="2.5" fill="#FFFFFF"/>
          <rect x="0" y="15.5" width="22" height="5" rx="2.5" fill="#FFFFFF"/>
          <circle cx="31" cy="18" r="5" fill="#6D5EF3"/>
          <rect x="0" y="26"   width="36" height="5" rx="2.5" fill="#FFFFFF"/>
        </g>
        <text
          x="50" y="31"
          font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-size="24"
          font-weight="800"
          letter-spacing="-0.6"
        >
          <tspan fill="#FFFFFF">Esar</tspan><tspan fill="#6D5EF3">IA</tspan>
        </text>
      </svg>
    </div>
    <div class="content">
      <div class="headline">Automatización útil<br>para negocios reales</div>
      <div class="sub">IA práctica para pequeñas empresas de Valladolid</div>
    </div>
  </div>
  <div class="bottom">
    <div class="dot"></div>
    <div class="url">esaria.es</div>
  </div>
</div>
</body>
</html>
