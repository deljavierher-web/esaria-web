<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EsarIA perfil circular seguro">
  <defs>
    <clipPath id="circle">
      <circle cx="400" cy="400" r="400"/>
    </clipPath>
    <radialGradient id="glow2" cx="75%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#6D5EF3" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="400" cy="400" r="400" fill="#0F172A"/>
  <circle cx="400" cy="400" r="400" fill="url(#glow2)"/>

  <!-- Icon mark — generous margin so no clipping on circle crop -->
  <!-- Safe area: 200px margin (25% of 800) all sides -->
  <!-- Mark in 280×280 centered box at 260,260 -->
  <g transform="translate(275, 275) scale(6.25)">
    <!-- Top bar -->
    <rect x="2" y="7"    width="36" height="5" rx="2.5" fill="#FFFFFF"/>
    <!-- Middle bar -->
    <rect x="2" y="17.5" width="22" height="5" rx="2.5" fill="#FFFFFF"/>
    <!-- Accent node -->
    <circle cx="33" cy="20" r="5" fill="#6D5EF3"/>
    <!-- Bottom bar -->
    <rect x="2" y="28"   width="36" height="5" rx="2.5" fill="#FFFFFF"/>
  </g>
</svg>
