<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EsarIA perfil Instagram">
  <defs>
    <clipPath id="ig-circle">
      <circle cx="400" cy="400" r="400"/>
    </clipPath>
    <radialGradient id="ig-glow" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#6D5EF3" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background —  works both as circle and square crop -->
  <rect width="800" height="800" fill="#0F172A"/>
  <rect width="800" height="800" fill="url(#ig-glow)"/>

  <!-- Icon mark — large, centered, safe margin for circle crop -->
  <!-- Visual center of isotipo at (20,20) in 40×40 coords → translate(400-20×8, 400-20×8) = translate(240,240) -->
  <!-- Mark area: 288×208 px centered at 400,400 → from 256,296 to 544,504 -->
  <g transform="translate(240, 240) scale(8)">
    <rect x="2"  y="7"    width="36" height="5" rx="2.5" fill="#FFFFFF"/>
    <rect x="2"  y="17.5" width="22" height="5" rx="2.5" fill="#FFFFFF"/>
    <circle cx="33" cy="20" r="5"  fill="#6D5EF3"/>
    <rect x="2"  y="28"   width="36" height="5" rx="2.5" fill="#FFFFFF"/>
  </g>
</svg>
