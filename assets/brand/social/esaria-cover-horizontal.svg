<svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EsarIA portada horizontal">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
    </style>
    <radialGradient id="g1" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1E2D4F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#6D5EF3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#g1)"/>
  <rect width="1500" height="500" fill="url(#g2)"/>

  <!-- Decorative accent line -->
  <rect x="0" y="0" width="1500" height="3" fill="#6D5EF3" opacity="0.6"/>

  <!-- Icon mark — left area, vertically centered -->
  <g transform="translate(120, 185) scale(3.25)">
    <rect x="2" y="7"    width="36" height="5" rx="2.5" fill="#FFFFFF"/>
    <rect x="2" y="17.5" width="22" height="5" rx="2.5" fill="#FFFFFF"/>
    <circle cx="33" cy="20" r="5" fill="#6D5EF3"/>
    <rect x="2" y="28"   width="36" height="5" rx="2.5" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <text
    x="252" y="282"
    font-family="'Inter', 'Manrope', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="88"
    font-weight="800"
    letter-spacing="-2"
  >
    <tspan fill="#FFFFFF">Esar</tspan><tspan fill="#6D5EF3">IA</tspan>
  </text>

  <!-- Divider -->
  <rect x="120" y="316" width="480" height="1.5" fill="#FFFFFF" opacity="0.12"/>

  <!-- Tagline -->
  <text
    x="120" y="358"
    font-family="'Inter', 'Manrope', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    fill="#94A3B8"
    letter-spacing="0.2"
  >Automatización útil para negocios reales</text>

  <!-- Right side — subtle geometric pattern -->
  <circle cx="1200" cy="250" r="180" fill="none" stroke="#6D5EF3" stroke-width="1" opacity="0.08"/>
  <circle cx="1200" cy="250" r="120" fill="none" stroke="#6D5EF3" stroke-width="1" opacity="0.1"/>
  <circle cx="1200" cy="250" r="60"  fill="none" stroke="#6D5EF3" stroke-width="1.5" opacity="0.12"/>

  <!-- Node dots on the circles -->
  <circle cx="1200" cy="70"  r="5" fill="#6D5EF3" opacity="0.3"/>
  <circle cx="1355" cy="195" r="4" fill="#6D5EF3" opacity="0.25"/>
  <circle cx="1320" cy="380" r="6" fill="#6D5EF3" opacity="0.35"/>
  <circle cx="1050" cy="310" r="3" fill="#6D5EF3" opacity="0.2"/>
</svg>
