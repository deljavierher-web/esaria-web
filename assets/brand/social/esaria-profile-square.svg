<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EsarIA perfil cuadrado">
  <!-- Background -->
  <rect width="800" height="800" fill="#0F172A"/>

  <!-- Subtle gradient accent in top-right corner -->
  <defs>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#6D5EF3" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#glow)"/>

  <!-- Icon mark — centered, large enough for profile, with safe zone margin -->
  <!-- Mark sits in a 280×280 area, centered at 400,400 -->
  <!-- Safe zone: 160px margin all sides for circle crop -->
  <g transform="translate(260, 260) scale(7)">
    <!-- Top bar -->
    <rect x="2" y="7"    width="36" height="5" rx="2.5" fill="#FFFFFF"/>
    <!-- Middle bar -->
    <rect x="2" y="17.5" width="22" height="5" rx="2.5" fill="#FFFFFF"/>
    <!-- Accent node -->
    <circle cx="33" cy="20" r="5" fill="#6D5EF3"/>
    <!-- Bottom bar -->
    <rect x="2" y="28"   width="36" height="5" rx="2.5" fill="#FFFFFF"/>
  </g>
</svg>
