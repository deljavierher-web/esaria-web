<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EsarIA icono monocromo">
  <!-- Top bar -->
  <rect x="2" y="7" width="36" height="5" rx="2.5" fill="#0F172A"/>
  <!-- Middle bar (shorter) -->
